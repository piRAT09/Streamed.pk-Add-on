app = "stremio-streamed-addon"
primary_region = "lhr"   # London – closest to most EU users

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 7000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
